# Referência de configuração para o Nginx externo do servidor.
# Copie este bloco para /etc/nginx/sites-available/boaterra
# e crie o symlink em /etc/nginx/sites-enabled/boaterra.
#
# Os containers expõem:
#   frontend → 127.0.0.1:3001
#   backend  → 127.0.0.1:3002

upstream boaterra_frontend {
    server 127.0.0.1:3001;
}

upstream boaterra_backend {
    server 127.0.0.1:3002;
}

server {
    listen 80;
    server_name seu-dominio.com;       # ← troque pelo domínio real
    client_max_body_size 15M;

    # /api/auth/ → Next.js (NextAuth lida com login/sessão)
    location /api/auth/ {
        proxy_pass         http://boaterra_frontend/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # /api/ → backend Express
    location /api/ {
        proxy_pass         http://boaterra_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check do backend
    location /health {
        proxy_pass http://boaterra_backend/health;
    }

    # Frontend Next.js (tudo o mais)
    location / {
        proxy_pass         http://boaterra_frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
