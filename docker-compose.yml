services:

  # ── Backend (Express + Prisma) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: boaterra-backend
    restart: always
    ports:
      - "8094:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    command: sh -c "npx prisma generate && npm run build && npm start"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./base64_logo.txt:/app/base64_logo.txt:ro
      - uploads_data:/app/uploads
    networks:
      - boaterra-net

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: boaterra-frontend
    restart: always
    ports:
      - "8093:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      BACKEND_INTERNAL_URL: http://backend:3002
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    depends_on:
      - backend
    command: sh -c "npx prisma generate --schema=./prisma-backend/schema.prisma && npx next build && npm start"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./backend/prisma:/app/prisma-backend:ro
    networks:
      - boaterra-net

networks:
  boaterra-net:
    driver: bridge

volumes:
  uploads_data:
